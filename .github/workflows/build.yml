name: 小米R3G OpenWrt 云编译

on:
  workflow_dispatch:
  push:
    branches: [master, main]

env:
  TZ: Asia/Shanghai
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    # 必须显式授予 contents: write，否则 action-gh-release 无法创建 tag 和 release
    permissions:
      contents: write
    steps:
      - name: 检出编译脚本
        uses: actions/checkout@v4

      - name: 更新系统 & 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget

      - name: 释放磁盘空间
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h

      - name: 克隆 Lean LEDE 源码
        run: |
          git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt
          cd openwrt

      - name: 执行自定义脚本（添加 feeds）
        run: |
          cd openwrt
          [ -e ../diy-part1.sh ] && bash ../diy-part1.sh

      - name: 更新 & 安装 feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 应用自定义编译配置
        run: |
          cd openwrt
          cp ../.config .config
          make defconfig

      - name: 执行自定义脚本（修改默认设置）
        run: |
          cd openwrt
          [ -e ../diy-part2.sh ] && bash ../diy-part2.sh

      - name: 修复下载脚本（GitHub 镜像加速）
        run: |
          cd openwrt
          # 为 download.pl 添加 GitHub 镜像源，解决部分源码包 404 问题
          # 在 @GITHUB handler 的 for 循环前插入镜像
          perl -i -pe '
            if (/\@GITHUB/ .. /for \(1 \.\. 5\)/) {
              if (/for \(1 \.\. 5\)/ && !$done++) {
                $_ = qq{\t\tpush \@mirrors, "https://ghproxy.net/https://github.com/\$1";\n\t\tpush \@mirrors, "https://gh-proxy.com/https://github.com/\$1";\n$_};
              }
            }
          ' scripts/download.pl
          echo "download.pl patched"

      - name: 下载所有源码包
        run: |
          cd openwrt
          make download -j8 V=s

      - name: 预下载 AdGuardHome 核心（gh-proxy 镜像）
        run: |
          cd openwrt
          # 设置自定义文件目录让 build 系统自动打包 files/ 到固件
          echo 'CONFIG_TARGET_ROOTFS_CUSTOM_FILES_DIR="files"' >> .config
          AGH_VERSION="v0.107.77"
          AGH_FILE="AdGuardHome_linux_mipsle_softfloat.tar.gz"
          AGH_URL="https://gh-proxy.com/https://github.com/AdguardTeam/AdGuardHome/releases/download/${AGH_VERSION}/${AGH_FILE}"
          echo "Downloading ${AGH_URL}"
          mkdir -p files/usr/bin
          wget -q --timeout=30 --tries=3 "$AGH_URL" -O /tmp/agh.tar.gz
          if [ -s /tmp/agh.tar.gz ]; then
            tar -xzf /tmp/agh.tar.gz -C /tmp/
            if [ -f /tmp/AdGuardHome/AdGuardHome ]; then
              cp /tmp/AdGuardHome/AdGuardHome files/usr/bin/
              chmod +x files/usr/bin/AdGuardHome
              ls -lh files/usr/bin/AdGuardHome
              echo "AdGuardHome core pre-downloaded successfully"
            else
              echo "::warning::AdGuardHome binary not found in extracted archive, listing /tmp/AdGuardHome:"
              ls -la /tmp/AdGuardHome/ 2>/dev/null || echo "  (directory not found)"
            fi
          else
            echo "::warning::AdGuardHome download failed (0 bytes), will rely on online update"
          fi

      - name: 替换下载链接为 gh-proxy 镜像
        run: |
          LINKS_FILE="package/luci-app-adguardhome/root/usr/share/AdGuardHome/links.txt"
          if [ -f "$LINKS_FILE" ]; then
            echo ">>> 原始 links.txt:"
            cat "$LINKS_FILE"
            # 在每条原始链接前插入对应的 gh-proxy 镜像链接
            sed -i 's|^https://github.com/AdguardTeam/AdGuardHome/releases/download/|https://gh-proxy.com/https://github.com/AdguardTeam/AdGuardHome/releases/download/|' "$LINKS_FILE"
            sed -i 's|^https://static.adguard.com/adguardhome/release/|https://gh-proxy.com/https://static.adguard.com/adguardhome/release/|' "$LINKS_FILE"
            echo ">>> 替换后的 links.txt:"
            cat "$LINKS_FILE"
          else
            echo "::warning::links.txt not found at $LINKS_FILE"
          fi

      - name: 编译固件
        run: |
          cd openwrt
          make -j$(nproc) V=s || make -j1 V=s

      - name: 生成版本号
        run: |
          SHORT_SHA=$(echo "$GITHUB_SHA" | head -c7)
          echo "VERSION=$(date +%Y%m%d)-${SHORT_SHA}" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=r3g-$(date +%Y%m%d)-${SHORT_SHA}" >> "$GITHUB_ENV"

      - name: 整理产物 & 校验
        run: |
          mkdir -p release
          FIRMWARE_DIR="openwrt/bin/targets/ramips/mt7621"
          TARGET_FILE="$FIRMWARE_DIR/openwrt-ramips-mt7621-xiaomi_mi-router-3g-squashfs-sysupgrade.bin"
          if [ ! -f "$TARGET_FILE" ]; then
            echo "::error::固件编译失败！未找到 $TARGET_FILE"
            echo "--- 输出目录内容 ---"
            ls -la "$FIRMWARE_DIR/" 2>/dev/null || echo "(目录不存在)"
            echo "--- openwrt/bin 内容 ---"
            ls -la openwrt/bin/ 2>/dev/null || echo "(目录不存在)"
            exit 1
          fi
          cp "$FIRMWARE_DIR/"*.bin release/
          ls -lh release/

      - name: 上传固件产物（Artifacts 备份）
        uses: actions/upload-artifact@v4
        with:
          name: Xiaomi_R3G_OpenWrt_Firmware_${{ env.VERSION }}
          path: release/*

      - name: 上传到 GitHub Releases
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: 小米R3G OpenWrt 固件 ${{ env.VERSION }}
          body: |
            ## 小米路由器 3G (MIR3G) OpenWrt 固件

            - **编译时间**: ${{ env.VERSION }}
            - **源码**: [Lean LEDE](https://github.com/coolsnowwolf/lede) master
            - **集成插件**: OpenClash + AdGuard Home
            - **默认 IP**: 192.168.123.1

            ### 📥 刷机方式

            | 文件 | 适用场景 |
            |------|---------|
            | `*sysupgrade.bin` | 已有 OpenWrt，系统升级 |
            | `*kernel1.bin` | Breed 刷入（内核分区） |
            | `*rootfs0.bin` | Breed 刷入（根文件系统） |

            ### ⚠️ 注意

            首次刷机请通过 Breed 刷入 kernel1 + rootfs0，或参考 [OpenWrt 官方 Wiki](https://openwrt.org/toh/xiaomi/mi_router_3g)。
          files: release/*.bin
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
