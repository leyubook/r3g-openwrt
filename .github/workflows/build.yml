name: 小米R3G OpenWrt 云编译

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  TZ: Asia/Shanghai
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出编译脚本
        uses: actions/checkout@v4

      - name: 更新系统 & 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget

      - name: 释放磁盘空间
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h

      - name: 克隆 Lean LEDE 源码
        run: |
          git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt
          cd openwrt

      - name: 执行自定义脚本（添加 feeds）
        run: |
          cd openwrt
          [ -e ../diy-part1.sh ] && bash ../diy-part1.sh

      - name: 更新 & 安装 feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 应用自定义编译配置
        run: |
          cd openwrt
          cp ../.config .config
          make defconfig

      - name: 执行自定义脚本（修改默认设置）
        run: |
          cd openwrt
          [ -e ../diy-part2.sh ] && bash ../diy-part2.sh

      - name: 下载所有源码包
        run: |
          cd openwrt
          make download -j8 V=s

      - name: 编译固件
        run: |
          cd openwrt
          make -j$(nproc) V=s || make -j1 V=s

      - name: 整理产物
        run: |
          mkdir -p release
          cp openwrt/bin/targets/ramips/mt7621/openwrt-ramips-mt7621-xiaomi_mi-router-3g-squashfs-sysupgrade.bin release/ 2>/dev/null || true
          cp openwrt/bin/targets/ramips/mt7621/openwrt-ramips-mt7621-xiaomi_mi-router-3g-squashfs-kernel1.bin release/ 2>/dev/null || true
          cp openwrt/bin/targets/ramips/mt7621/openwrt-ramips-mt7621-xiaomi_mi-router-3g-squashfs-rootfs0.bin release/ 2>/dev/null || true
          ls -lh release/

      - name: 上传固件产物
        uses: actions/upload-artifact@v4
        with:
          name: Xiaomi_R3G_OpenWrt_Firmware
          path: release/
